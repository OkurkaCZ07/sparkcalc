<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80">
  <defs>
    <linearGradient id="spark-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b2b"/>
      <stop offset="50%" stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#ffd93d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Spark icon -->
  <g transform="translate(8, 6)">
    <!-- Spark/flame shape -->
    <path d="M 33 4 C 33 4 22 20 22 30 C 22 38 26 42 30 44 C 27 40 26 34 30 28 C 32 24 36 22 38 26 C 40 30 38 36 34 40 C 34 40 38 44 38 44 C 44 42 48 36 48 28 C 48 16 33 4 33 4 Z"
          fill="url(#spark-grad)" filter="url(#glow)"/>
    
    <!-- Inner bright core -->
    <path d="M 33 18 C 33 18 28 26 28 32 C 28 36 30 38 33 38 C 36 38 38 36 38 32 C 38 26 33 18 33 18 Z"
          fill="#fff" opacity="0.6"/>
    
    <!-- Small sparks -->
    <circle cx="18" cy="22" r="1.5" fill="#ff8c42" opacity="0.6"/>
    <circle cx="48" cy="18" r="1" fill="#ffd93d" opacity="0.5"/>
    <circle cx="14" cy="34" r="1" fill="#ff6b2b" opacity="0.4"/>
    <circle cx="50" cy="30" r="1.5" fill="#ff8c42" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <text x="68" y="52" font-family="'Outfit', 'Segoe UI', sans-serif" font-weight="800" font-size="42" letter-spacing="-1">
    <tspan fill="#e2e8f0">Spark</tspan><tspan fill="#ff8c42">Calc</tspan>
  </text>

  <!-- Tagline -->
  <text x="70" y="70" font-family="'Outfit', 'Segoe UI', sans-serif" font-weight="500" font-size="11" fill="#7a8599" letter-spacing="3">
    AI-POWERED ELECTRONICS TOOLKIT
  </text>
</svg>
